name: "Build new artifacts"

on:
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

env:
  REGISTRY: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  make-artifacts:
    runs-on: [self-hosted, ops]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set env
        run: |
          echo "REVISION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Docker build and push
        run: |
          DOCKER_BUILDKIT=1 docker build -t ${REGISTRY}/leafage-evm:${REVISION} -f Dockerfile .
          docker push ${REGISTRY}/leafage-evm:${REVISION}
          docker rmi ${REGISTRY}/leafage-evm:${REVISION}
          
      - name: comment PR
        uses: unsplash/comment-on-pr@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          msg: ":tada: Image `${{ env.REGISTRY }}/leafage-evm:${{ env.REVISION }}` were builded"
          check_for_duplicate_msg: true
        continue-on-error: true