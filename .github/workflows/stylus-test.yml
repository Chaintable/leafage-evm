name: stylus-test

on:
  pull_request:
    branches: [arb-evm]
    paths:
      - .github/workflows/stylus-test.yml
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - crates/leafage-evm-chains/Cargo.toml
      - crates/leafage-evm-chains/src/arbitrum/**
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu2404-linux-x86-64-16c
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu2204-arm64-16c
            arch: arm64
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Stylus FFI
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          target: stylus-tests
          push: false
          cache-from: type=gha,scope=stylus-test-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=stylus-test-${{ matrix.arch }}
