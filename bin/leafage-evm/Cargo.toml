[package]
name = "leafage-evm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
exclude.workspace = true


[dependencies]
leafage-evm-storage.workspace = true
leafage-evm-types.workspace = true
leafage-evm-rpc.workspace = true
leafage-evm-chains.workspace = true
anyhow.workspace = true
jsonrpsee.workspace = true
tokio.workspace = true
tracing.workspace = true
clap.workspace = true
serde_json.workspace = true
serde.workspace = true
tracing-subscriber.workspace = true
tikv-jemallocator = { workspace = true, features = ["profiling"] }
# tikv-jemalloc-sys 保留：workspace 上声明的 features (unprefixed_malloc_on_supported_platforms,
# profiling, stats) 只有通过 .workspace = true 激活才会生效，缺了 jemalloc 不会真正替换 libc malloc。
tikv-jemalloc-sys.workspace = true
jemalloc_pprof = { workspace = true, features = ["symbolize"] }
alloy-rlp.workspace = true
rdkafka.workspace = true
aws-sdk-s3.workspace = true
aws-config.workspace = true
flate2.workspace = true
etcd-client.workspace = true
metrics-exporter-prometheus = { workspace = true, features = ["http-listener"] }
metrics.workspace = true
futures.workspace = true
lru.workspace = true
axum.workspace = true
pprof = { workspace = true, features = ["cpp", "prost-codec"] }
