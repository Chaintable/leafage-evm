version: "3.5"
networks:
  eth:
    ipam:
      driver: default
      config:
        - subnet: 10.0.90.0/24

services:
  beacon:
    networks:
      - eth
    image: sigp/lighthouse:v8.0.1
    volumes:
      - ${ETH_DATA_DIR:-/eth}:/var/data/
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: '12G'
    command:
      - lighthouse
      - beacon_node
      - --network=mainnet
      - --datadir=/var/data/lighthouse
      - --execution-endpoint=http://geth:8551
      - --execution-jwt=/var/data/geth/jwtsecret
      - --checkpoint-sync-url=https://mainnet.checkpoint.sigp.io

  geth:
    networks:
      - eth
    image: public.ecr.aws/b2h7a5c4/chaintable/ethereum-writer:v1.17.3-debank-3
    volumes:
      - ${ETH_DATA_DIR:-/eth}:/var/data/
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: '24G'
    ports:
      - 8666:8545
    entrypoint:
      - /app/geth
      - --datadir=/var/data/geth
      - --syncmode=full
      - --gcmode=archive
      - --rpc.allow-unprotected-txs
      - --rpc.gascap=250000000
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8551
      - --authrpc.jwtsecret=/var/data/geth/jwtsecret
      - --authrpc.vhosts=*
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=net,web3,eth,admin,debug,txpool,engine,trace

  leafage-evm-x-eth:
    image: public.ecr.aws/b2h7a5c4/chaintable/leafage-evm-x:v1.2.31
    networks:
      - eth
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    volumes:
      -  ${LEAFAGE_DATA_DIR:-/nodex-eth}:/nodex-eth
    ports:
      - 8659:8659
    command:
      - standalone
      - --db-path=/nodex-eth
      - --listen-addr=0.0.0.0:8659
      - --chain-cfg=1
      - --rpc-addr=http://geth:8545