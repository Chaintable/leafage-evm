services:
  # ============================================================
  # 写节点 - tempo (debank patched, trace_debankBlock)
  # ============================================================
  tempo:
    container_name: tempo-dev
    image: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com/blockchain/tempo:c0b3a37
    restart: unless-stopped
    stop_grace_period: 60s
    ports:
      - "8566:8545"
      - "8567:8546"
      - "9011:9001"
    volumes:
      - /data/tempo:/data
    command:
      - node
      - --datadir=/data
      - --chain=mainnet
      - --follow=auto
      - --http
      - --http.addr=0.0.0.0
      - --http.api=eth,net,web3,trace,debug
      - --ws
      - --ws.addr=0.0.0.0
      - --metrics=0.0.0.0:9001
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        compress: "true"

  # ============================================================
  # ETL - background-tracer, 消费 trace 推送 S3/Kafka
  # ============================================================
  etl:
    container_name: etl-tempo
    image: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com/background-tracer:amd64-v0.1.31
    network_mode: "host"
    user: "0:0"
    stop_signal: SIGTERM
    restart: unless-stopped
    volumes:
      - /data/tempo:/data
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    entrypoint:
      - /app/background-tracer
    command:
      - run
      - --region=ap-northeast-1
      - --nodex-bucket=chaintable-nodex-pipeline--apne1-az4--x-s3
      - --chain-table-bucket=chaintable-pipeline--apne1-az4--x-s3
      - --brokers=b-2.chaintablenodexpi.udy5cj.c4.kafka.ap-northeast-1.amazonaws.com:9092
      - --topic=nodex_pipeline_4217_f490914c
      - --rpc-address=http://127.0.0.1:8566
      - --chain-id=4217
      - --version=f490914c
      - --genesis-block=0
      - --start-block=0
      - --max-task=16
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # 读节点 - leafage-evm (tempo mode, chain_id=4217)
  # ============================================================
  leafage-evm-x-tempo:
    image: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com/leafage-evm-x:${LEAFAGE_TAG:-amd64-chaintable-v102-debank-15}
    container_name: leafage-evm-x-tempo
    restart: always
    network_mode: "host"
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    volumes:
      - /data/tempo-nodex:/nodex
    command:
      - standalone
      - --db-path=/nodex
      - --listen-addr=0.0.0.0:8568
      - --chain-cfg=4217
      - --evm-type=tempo
      - --archive
      - --meta=172.21.49.2:8568
      - --kafka-s3-config={"topic":"nodex_pipeline_4217_f490914c","brokers":"b-2.chaintablenodexpi.udy5cj.c4.kafka.ap-northeast-1.amazonaws.com:9092","partition":0,"bucket_name":"chaintable-nodex-pipeline--apne1-az4--x-s3","outer_bucket_name":"chaintable-pipeline--apne1-az4--x-s3","offset_dir":"/nodex/offset","s3_chain_id":"4217","version":"f490914c"}
      - --etcd-config={"endpoints":["127.0.0.1:2379"],"keep_alive_interval_ms":500,"lease_ttl_s":5}
      - --genesis-number=0
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        compress: "true"

  # ============================================================
  # 一致性校验 - consistency-checker
  # ============================================================
  consistency-checker:
    image: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com/consistency-checkerx:amd64-v1.0.18
    network_mode: "host"
    container_name: consistency-tempo
    restart: always
    volumes:
      - /data/tempo-consistency:/tempo
      - ./config-tempo.yml:/config.yml
    command: ["-config", "/config.yml"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
