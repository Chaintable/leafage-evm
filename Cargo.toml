[workspace]
members = ["bin/leafage-evm", "crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["leafage-evm Contributors"]
license = "MIT OR Apache-2.0"
exclude = ["benches/", "tests/"]


[workspace.dependencies]
revm = { git = "https://github.com/bluealloy/revm", tag = "v26", features = [
    "serde",
    "optional_eip3607",
    "optional_no_base_fee",
    "optional_balance_check",
    "optional_block_gas_limit",
] }
leafage-evm-storage = { path = "crates/leafage-evm-storage" }
leafage-evm-types = { path = "crates/leafage-evm-types" }
leafage-evm-rpc = { path = "crates/leafage-evm-rpc" }
auto_impl = "1.1.0"
bytes = "1.4.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rocksdb = { version = "0.21.0", features = ["jemalloc"] }
jsonrpsee = { version = "0.21", features = ["server", "client", "macros"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0.43"
async-trait = "0.1.68"
ethers-core = "2.0.10"
anyhow = "1.0.72"
tokio = { version = "1.29", features = ["full"] }
clap = { version = "4.3.21", features = ["derive"] }
serde_json = "1.0"
open-fastrlp = "0.1.4"
open-fastrlp-derive = "0.1.1"
ruint = { version = "1.10", features = ["primitive-types"] }
tikv-jemallocator = "0.5.4"
tikv-jemalloc-ctl = "0.5.4"
tikv-jemalloc-sys = { version = "0.5.4", features = [
    "stats",
    "profiling",
    "unprefixed_malloc_on_supported_platforms",
] }
tower = { version = "0.4.13", features = ["full"] }
console-subscriber = "0.2.0"
quick_cache = "0.4.0"
prometheus = "0.13.1"
once_cell = "1.19.0"
futures = "0.3.30"
hyper = "0.14.28"
