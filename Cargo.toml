[workspace]
members = ["bin/leafage-evm", "crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.79"
authors = ["leafage-evm Contributors"]
license = "MIT OR Apache-2.0"
exclude = ["benches/", "tests/"]


[workspace.dependencies]
leafage-evm-storage = { path = "crates/leafage-evm-storage" }
leafage-evm-types = { path = "crates/leafage-evm-types" }
leafage-evm-rpc = { path = "crates/leafage-evm-rpc" }
auto_impl = "1.1.2"
bytes = "1.5.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rocksdb = { version = "0.21.0", features = ["jemalloc"] }
jsonrpsee = { version = "0.22", features = ["server", "client", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
async-trait = "0.1"
anyhow = "1.0"
tokio = { version = "1.36", features = ["full"] }
clap = { version = "4.3", features = ["derive"] }
tikv-jemallocator = "0.5.4"
tikv-jemalloc-ctl = "0.5.4"
tikv-jemalloc-sys = { version = "0.5.4", features = [
    "stats",
    "profiling",
    "unprefixed_malloc_on_supported_platforms",
] }
tower = { version = "0.4.13", features = ["full"] }
console-subscriber = "0.2.0"
quick_cache = "0.4.0"
prometheus = "0.13.1"
once_cell = "1.19.0"
futures = "0.3.30"
hyper = "0.14.28"
num_cpus = "1.16.0"

# eth

revm = { version = "14.0.3", features = [
    "std",
    "secp256k1",
    "blst",
    "serde",
    "optional_eip3607",
    "optional_no_base_fee",
    "optional_balance_check",
    "optional_block_gas_limit",
] }
revm-inspectors = "0.8"
alloy-chains = "0.1.18"
alloy = { version = "0.4", features = ["full"] }
alloy-rlp = "0.3"
alloy-rlp-derive = "0.3"
op-alloy-rpc-types = "0.3"
op-alloy-consensus = "0.3"

[profile.release]
opt-level = 3
debug = true
