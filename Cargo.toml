[workspace]
members = ["bin/leafage-evm", "crates/*"]
resolver = "2"

[workspace.package]
version = "0.0.1"
edition = "2021"
rust-version = "1.70"
authors = ["leafage-evm Contributors"]
license = "MIT OR Apache-2.0"
exclude = ["benches/", "tests/"]


[workspace.dependencies]
revm = { version = "3.3.0", features = [
    "serde",
    "optional_eip3607",
    "optional_no_base_fee",
    "optional_balance_check",
    "optional_block_gas_limit",
] }
leafage-evm-storage = { path = "crates/leafage-evm-storage" }
leafage-evm-types = { path = "crates/leafage-evm-types" }
leafage-evm-rpc = { path = "crates/leafage-evm-rpc" }
auto_impl = "1.1.0"
arc-swap = "1.6.0"
bytes = "1.4.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dashmap = "5.5.0"
rocksdb = "0.21.0"
alloy-rlp = "0.3.2"
alloy-rlp-derive = "0.3.2"
ruint = { version = "1.10.1", features = [
    "primitive-types",
    "rlp",
    "alloy-rlp",
] }
jsonrpsee = { version = "0.18", features = ["server", "client", "macros"] }
serde = { version = "1.0", features = ["derive"] }
rustc-hex = "2.1.0"
hex = "0.4.3"
thiserror = "1.0.43"
async-trait = "0.1.68"
ethers-core = "2.0.8"
anyhow = "1.0.72"
tokio = { version = "1.29", features = ["full"] }
clap = { version = "4.3.21", features = ["derive"] }
serde_json = "1.0"
